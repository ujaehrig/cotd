name: Build and Push Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'takeover_app.py'
      - 'db.py'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cotd-takeover:latest
            ghcr.io/${{ github.repository }}/cotd-takeover:${{ github.sha }}
